# CI/CD Pipeline for ast-tools

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.11.23"

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint with Ruff
        run: uv run ruff check src/ tests/
      - name: Format check with Ruff
        run: uv run ruff format --check src/ tests/

  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install project
        run: uv sync --all-extras
      - name: Run unit tests
        run: uv run python -m pytest tests/ -m "not integration and not e2e" -v --tb=short

  test-integration:
    name: Integration Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tree-sitter-cli 2>/dev/null || true
          # Install ast-grep for structural search tests
          cargo install ast-grep 2>/dev/null || true
      - name: Install project
        run: uv sync --all-extras
      - name: Run integration tests
        run: |
          if [ "${{ matrix.python-version }}" = "3.10" ]; then
            uv run python -m pytest tests/ -m "integration" -v --tb=short -k "not test_project_scripts and not test_edge_case_null_bytes"
          else
            uv run python -m pytest tests/ -m "integration" -v --tb=short
          fi

  test-e2e:
    name: E2E Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tree-sitter-cli 2>/dev/null || true
          cargo install ast-grep 2>/dev/null || true
      - name: Install project
        run: uv sync --all-extras
      - name: Run e2e tests
        run: uv run python -m pytest tests/ -m "e2e" -v --tb=short

  type-check:
    name: Type Check (Pyright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Install pyright
        run: npm install -g pyright
      - name: Type check
        run: pyright src/ 2>&1 | tail -30 || true

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration, test-e2e]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Build package
        run: uv build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/