name: ast-tools-codebase-index
version: "1.0.0"
description: |-
  Automatic codebase indexing via ast-tools + session file mutation tracking.

  - Watchdog file watcher for automatic semantic reindexing
  - CLI: `hermes index-watch` to start the watcher daemon
  - Tools: `codebase_index_refresh`, `codebase_index_status`
  - agent:end hook: tracks file mutations during sessions, calls ast-tools
    codebase_summary for structural snapshots

  Absorbs: hooks/code-intelligence/handler.py + HOOK.yaml
author: "RapidWebs Enterprise (Lucien)"
license: "MIT"
tags: ["ast", "codebase", "index", "intelligence", "semantic"]
hooks:
  - on_session_end